name: Scheduled Upgrade

# Applies the next item from the .upgrades backlog roughly every 6 hours.
# The commit is made via the GitHub Contents API using a personal access token
# (secret: UPGRADE_TOKEN), so it is signed (Verified) and attributed to you.
# Costs zero LLM tokens -- every change is deterministic Python.

on:
  schedule:
    - cron: "0 */6 * * *" # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

# This job commits via the API/PAT, not the default token, so no extra
# permissions are needed here.
permissions:
  contents: read

concurrency:
  group: scheduled-upgrade
  cancel-in-progress: false

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply next backlog upgrade
        env:
          UPGRADE_TOKEN: ${{ secrets.UPGRADE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          UPGRADE_BRANCH: main
        run: python .upgrades/runner.py
